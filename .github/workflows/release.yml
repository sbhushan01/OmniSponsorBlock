name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # needed by gh release create
  pages: write         # needed by deploy-pages
  id-token: write      # needed by deploy-pages OIDC

jobs:
  # ── 1. Build all browser targets ───────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4  →  actions/checkout@v5  (Node 20 → Node 24)
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: '20'   # keep build runtime at 20; only the *action* needs node24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all targets
        run: |
          npm run build          # Chrome / Edge (MV3)
          npm run build:firefox  # Firefox (MV2)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. Create GitHub Release ────────────────────────────────────────────────
  #   softprops/action-gh-release@v2 has no Node 24 build yet (issue #654).
  #   Use the built-in `gh` CLI instead — zero Node.js dependency.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Package zips
        run: |
          cd dist
          for dir in */; do
            target="${dir%/}"
            zip -r "../${target}.zip" "$dir"
          done

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            *.zip

  # ── 3. Deploy update manifest to GitHub Pages ───────────────────────────────
  #   peaceiris/actions-gh-pages@v4 has no Node 24 build.
  #   Use the official actions/upload-pages-artifact + actions/deploy-pages instead.
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp updates.xml _site/updates.xml

      # upload-pages-artifact runs on Node 24
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      # deploy-pages runs on Node 24
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
