name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # needed by gh release create

jobs:
  # ── 1. Build all browser targets ───────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4  →  actions/checkout@v5  (Node 20 → Node 24)
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: '20'   # keep build runtime at 20; only the *action* needs node24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all targets
        run: |
          npm run build          # Chrome / Edge (MV3)
          npm run build:firefox  # Firefox (MV2)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. Create GitHub Release ────────────────────────────────────────────────
  #   softprops/action-gh-release@v2 has no Node 24 build yet (issue #654).
  #   Use the built-in `gh` CLI instead — zero Node.js dependency.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Package zips
        run: |
          cd dist
          for dir in */; do
            target="${dir%/}"
            zip -r "../${target}.zip" "$dir"
          done

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            *.zip

  # GitHub Pages (updates.xml + OmniSponsorBlock.crx) is deployed by package-release.yml
  # when a release is published. Do not deploy only updates.xml here: deploy-pages replaces
  # the whole site and would remove the .crx, breaking chrome_update checks.
