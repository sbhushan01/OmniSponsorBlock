name: Package and Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Build Chrome .crx + .zip ──────────────────────────────────────────
  build-chrome:
    name: Build Chrome (.crx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: recursive

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Chrome extension
        run: node scripts/copy-static-chrome.mjs

      - name: Update version in manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' dist/manifest.json > dist/manifest.tmp.json
          mv dist/manifest.tmp.json dist/manifest.json

      - name: Restore signing key
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" | base64 --decode > key.pem

      - name: Install crx3
        run: npm install -g crx3

      - name: Pack extension as .crx
        run: |
          crx3 dist/ --key key.pem --crx OmniSponsorBlock.crx
          if [ ! -f OmniSponsorBlock.crx ]; then echo "CRX generation failed"; exit 1; fi

      - name: Wipe key from disk
        run: rm -f key.pem

      - name: Package extension as .zip
        run: |
          cd dist
          zip -r ../OmniSponsorBlock.zip .
          cd ..

      - name: Update updates.xml
        run: |
          cat > updates.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="igkgdedndffdoljpojoaedjioopnpneb">
              <updatecheck
                codebase="https://github.com/${{ github.repository }}/releases/latest/download/OmniSponsorBlock.crx"
                version="${{ steps.version.outputs.VERSION }}" />
            </app>
          </gupdate>
          EOF

      - name: Save Chrome assets
        run: |
          mkdir -p /tmp/osb-chrome
          cp dist/manifest.json /tmp/osb-chrome/
          cp updates.xml OmniSponsorBlock.crx OmniSponsorBlock.zip /tmp/osb-chrome/

      - name: Upload Chrome assets
        uses: actions/upload-artifact@v4
        with:
          name: chrome-assets
          path: /tmp/osb-chrome/
          retention-days: 1

  # ── 2. Build Firefox .xpi ─────────────────────────────────────────────────
  build-firefox:
    name: Build Firefox (.xpi)
    runs-on: ubuntu-latest
    env:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: recursive

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Firefox MV2 extension
        run: npm run build:firefox

      - name: Fix and Stamp Firefox Manifest
        run: |
          # Force inject missing requirements: default_locale and data_collection_permissions
          jq --arg v "${{ steps.version.outputs.VERSION }}" '
            .version = $v |
            .default_locale = "en" |
            .browser_specific_settings.gecko += {
              "id": "omnisponsorblock@sbhushan01.github.io",
              "strict_min_version": "109.0",
              "data_collection_permissions": false
            }
          ' dist/manifest.json > dist/manifest.tmp.json
          mv dist/manifest.tmp.json dist/manifest.json

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign .xpi via AMO
        id: amo_sign
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        run: |
          web-ext sign \
            --source-dir dist/ \
            --artifacts-dir /tmp/osb-firefox/ \
            --api-key  "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed
          SIGNED=$(ls /tmp/osb-firefox/*.xpi | head -1)
          mv "$SIGNED" /tmp/osb-firefox/OmniSponsorBlock.xpi
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Build unsigned .xpi (fallback)
        if: steps.amo_sign.outputs.signed != 'true'
        run: |
          mkdir -p /tmp/osb-firefox
          web-ext build \
            --source-dir dist/ \
            --artifacts-dir /tmp/osb-firefox/ \
            --overwrite-dest
          BUILT=$(ls /tmp/osb-firefox/*.zip | head -1)
          mv "$BUILT" /tmp/osb-firefox/OmniSponsorBlock.xpi

      - name: Generate updates.json for Firefox
        run: |
          cat > /tmp/osb-firefox/updates.json <<EOF
          {
            "addons": {
              "omnisponsorblock@sbhushan01.github.io": {
                "updates": [
                  {
                    "version": "${{ steps.version.outputs.VERSION }}",
                    "update_link": "https://github.com/${{ github.repository }}/releases/latest/download/OmniSponsorBlock.xpi"
                  }
                ]
              }
            }
          }
          EOF

      - name: Upload Firefox assets
        uses: actions/upload-artifact@v4
        with:
          name: firefox-assets
          path: /tmp/osb-firefox/
          retention-days: 1

  # ── 3. Publish release ────────────────────────────────────────────────────
  publish:
    name: Publish Release Assets
    needs: [build-chrome, build-firefox]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download Chrome assets
        uses: actions/download-artifact@v4
        with:
          name: chrome-assets
          path: /tmp/osb-chrome/

      - name: Download Firefox assets
        uses: actions/download-artifact@v4
        with:
          name: firefox-assets
          path: /tmp/osb-firefox/

      - name: Commit update manifests
        run: |
          cp /tmp/osb-chrome/manifest.json .
          cp /tmp/osb-chrome/updates.xml .
          cp /tmp/osb-firefox/updates.json .
          
          jq --arg v "${{ github.ref_name }}" '.version = ($v | sub("^v";""))' manifest.firefox.v2.json > manifest.firefox.tmp.json
          mv manifest.firefox.tmp.json manifest.firefox.v2.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest.firefox.v2.json updates.xml updates.json
          git diff --cached --quiet || git commit -m "chore: bump version to $(jq -r .version manifest.json)"
          git push origin "HEAD:refs/heads/${{ github.event.repository.default_branch }}" || echo "Push failed. Continuing to release..."

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --target "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" --clobber \
            /tmp/osb-chrome/OmniSponsorBlock.zip \
            /tmp/osb-chrome/OmniSponsorBlock.crx \
            /tmp/osb-firefox/OmniSponsorBlock.xpi
