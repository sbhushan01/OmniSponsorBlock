name: Package and Release Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Build from the exact tag this release points at (matches release.yml zips).
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Restore signing key
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" | base64 --decode > key.pem

      - name: Install crx3
        run: npm install -g crx3

      - name: Pack extension as .crx
        run: crx3 pack . --key key.pem --crx OmniSponsorBlock.crx

      - name: Wipe key from disk
        run: rm -f key.pem

      - name: Package extension as .zip
        run: |
          zip -r OmniSponsorBlock.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.zip" \
            --exclude "*.crx" \
            --exclude "updates.xml" \
            --exclude "key.pem"

      # appid must match chrome://extensions id for installs built with CRX_PRIVATE_KEY (see updates.xml in repo).
      - name: Update updates.xml
        run: |
          cat > updates.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="igkgdedndffdoljpojoaedjioopnpneb">
              <updatecheck
                codebase="https://github.com/sbhushan01/OmniSponsorBlock/releases/latest/download/OmniSponsorBlock.crx"
                version="${{ steps.version.outputs.VERSION }}" />
            </app>
          </gupdate>
          EOF

      - name: Save built assets for upload and default-branch bump
        run: |
          mkdir -p /tmp/osb-release
          cp manifest.json updates.xml OmniSponsorBlock.crx OmniSponsorBlock.zip /tmp/osb-release/

      - name: Checkout default branch for version bump commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive

      - name: Commit manifest.json and updates.xml
        run: |
          cp /tmp/osb-release/manifest.json /tmp/osb-release/updates.xml .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json updates.xml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin "HEAD:refs/heads/${{ github.event.repository.default_branch }}"

      # Same rationale as release.yml: avoid softprops/action-gh-release on runners where its
      # Node action runtime can fail; use gh CLI (preinstalled on ubuntu-latest).
      - name: Upload extension assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/osb-release/OmniSponsorBlock.zip /tmp/osb-release/OmniSponsorBlock.crx --clobber
