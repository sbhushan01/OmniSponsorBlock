name: Package and Release Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ── 1. Build Chrome .crx + .zip ────────────────────────────────────────────
  build-chrome:
    name: Build Chrome (.crx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Restore signing key
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" | base64 --decode > key.pem

      - name: Install crx3
        run: npm install -g crx3

      - name: Pack extension as .crx
        run: crx3 pack . --key key.pem --crx OmniSponsorBlock.crx

      - name: Wipe key from disk
        run: rm -f key.pem

      - name: Package extension as .zip
        run: |
          zip -r OmniSponsorBlock.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.zip" \
            --exclude "*.crx" \
            --exclude "updates.xml" \
            --exclude "key.pem" \
            --exclude "src/*" \
            --exclude "scripts/*" \
            --exclude "node_modules/*"

      - name: Update updates.xml
        run: |
          cat > updates.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="igkgdedndffdoljpojoaedjioopnpneb">
              <updatecheck
                codebase="https://github.com/${{ github.repository }}/releases/latest/download/OmniSponsorBlock.crx"
                version="${{ steps.version.outputs.VERSION }}" />
            </app>
          </gupdate>
          EOF

      - name: Save Chrome assets
        run: |
          mkdir -p /tmp/osb-chrome
          cp manifest.json updates.xml OmniSponsorBlock.crx OmniSponsorBlock.zip /tmp/osb-chrome/

      - name: Upload Chrome assets
        uses: actions/upload-artifact@v4
        with:
          name: chrome-assets
          path: /tmp/osb-chrome/
          retention-days: 1

  # ── 2. Build Firefox .xpi ───────────────────────────────────────────────────
  build-firefox:
    name: Build Firefox (.xpi)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Firefox MV2 extension
        run: npm run build:firefox
        # Produces dist/ via copy-static-firefox.mjs + rollup

      - name: Stamp version into Firefox manifest
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' dist/manifest.json \
            > dist/manifest.tmp.json
          mv dist/manifest.tmp.json dist/manifest.json

      # Firefox requires a stable gecko.id for AMO submission, update checks, and
      # for web-ext sign/build to produce a well-formed .xpi.
      - name: Inject gecko browser_specific_settings (if absent)
        run: |
          jq '
            if .browser_specific_settings then .
            else . + {
              "browser_specific_settings": {
                "gecko": {
                  "id": "omnisponsorblock@sbhushan01.github.io",
                  "strict_min_version": "109.0"
                }
              }
            }
            end
          ' dist/manifest.json > dist/manifest.tmp.json
          mv dist/manifest.tmp.json dist/manifest.json

      - name: Install web-ext
        run: npm install -g web-ext

      # ── Signed path (AMO credentials present) ──────────────────────────────
      # Store your AMO API credentials as repository secrets:
      #   AMO_API_KEY    → your AMO JWT issuer (looks like "user:12345:678")
      #   AMO_API_SECRET → your AMO JWT secret
      # Generate them at: https://addons.mozilla.org/developers/addon/api/key/
      - name: Sign .xpi via AMO (if credentials are present)
        id: amo_sign
        if: ${{ secrets.AMO_API_KEY != '' && secrets.AMO_API_SECRET != '' }}
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir dist/ \
            --artifacts-dir /tmp/osb-firefox/ \
            --api-key  "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed
          # Rename the signed file to a predictable name
          SIGNED=$(ls /tmp/osb-firefox/*.xpi | head -1)
          mv "$SIGNED" /tmp/osb-firefox/OmniSponsorBlock.xpi
          echo "signed=true" >> $GITHUB_OUTPUT

      # ── Unsigned fallback (no AMO credentials) ─────────────────────────────
      # Produces an unsigned .xpi installable in Firefox Developer Edition /
      # Nightly, or via about:debugging > Load Temporary Add-on.
      - name: Build unsigned .xpi (fallback)
        if: steps.amo_sign.outputs.signed != 'true'
        run: |
          mkdir -p /tmp/osb-firefox
          web-ext build \
            --source-dir dist/ \
            --artifacts-dir /tmp/osb-firefox/ \
            --overwrite-dest
          # Rename to stable filename expected by the release upload step
          BUILT=$(ls /tmp/osb-firefox/*.zip | head -1)
          mv "$BUILT" /tmp/osb-firefox/OmniSponsorBlock.xpi

      - name: Upload Firefox .xpi artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-xpi
          path: /tmp/osb-firefox/OmniSponsorBlock.xpi
          retention-days: 1

  # ── 3. Attach everything to the GitHub Release + bump default branch ────────
  publish:
    name: Publish Release Assets
    needs: [build-chrome, build-firefox]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: recursive

      - name: Download Chrome assets
        uses: actions/download-artifact@v4
        with:
          name: chrome-assets
          path: /tmp/osb-chrome/

      - name: Download Firefox .xpi
        uses: actions/download-artifact@v4
        with:
          name: firefox-xpi
          path: /tmp/osb-firefox/

      - name: Commit manifest.json and updates.xml to default branch
        run: |
          cp /tmp/osb-chrome/manifest.json /tmp/osb-chrome/updates.xml .
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json updates.xml
          git diff --cached --quiet || git commit -m "chore: bump version to $(jq -r .version manifest.json)"
          git push origin "HEAD:refs/heads/${{ github.event.repository.default_branch }}"

      - name: Upload all assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/osb-chrome/OmniSponsorBlock.zip \
            /tmp/osb-chrome/OmniSponsorBlock.crx \
            /tmp/osb-firefox/OmniSponsorBlock.xpi \
            --clobber
