name: Generate Key (One-Time Setup)
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate key and print as base64
        run: |
          openssl genrsa -out key.pem 2048
          echo "======= COPY EVERYTHING BETWEEN THESE LINES ======="
          base64 -w 0 key.pem
          echo ""
          echo "======= STOP HERE ======="
